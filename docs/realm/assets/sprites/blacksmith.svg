<?xml version="1.0" encoding="UTF-8"?>
<!--
  Blacksmith sprite — Loop 176 (SVG axis, 8th sprite).
  Phase A 3/5 per 171 strategic plan.
  Sibling to render.js drawBlacksmith canvas implementation.

  ViewBox 0 0 128 128. Blacksmith centered at x=64; ground at y=104.
  Light: upper-left.

  CANONICAL VARIANT: classic amber forge fire. Canvas drawBlacksmith
  picks 1 of 6 fire-color palettes (amber × 2 / purple-magical /
  alchemical-green / white-hot / blue) via per-smithy hash. SVG
  ships canonical amber; other variants deferred to Phase B step 5.

  Form: dark stone walls (industrial contrast vs tavern's warmth) +
  side-wall depth + flat parapet roof (no peak) + arched forge
  window with pulsing amber fire core + heavy stone chimney with
  rising dark smoke + iron-banded wooden door + anvil prop with
  horn + propped hammer + tongs hanging on wall + ash pile under
  window + ambient forge-glow on ground + sparks rising from
  forge.
-->
<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dark stone wall: cool industrial gradient -->
    <linearGradient id="bsmithStone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7a6a5e"/>
      <stop offset="0.5" stop-color="#4a3830"/>
      <stop offset="1" stop-color="#2a1e18"/>
    </linearGradient>

    <!-- Side wall (deeper shadow) -->
    <linearGradient id="bsmithStoneSide" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4a3830"/>
      <stop offset="1" stop-color="#1a120e"/>
    </linearGradient>

    <!-- Flat roof parapet -->
    <linearGradient id="bsmithRoof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6a5a52"/>
      <stop offset="1" stop-color="#3a2a22"/>
    </linearGradient>

    <!-- Forge fire glow (amber canonical variant) -->
    <radialGradient id="forgeGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="rgba(255,220,80,0.95)"/>
      <stop offset="0.4" stop-color="rgba(255,150,30,0.7)"/>
      <stop offset="0.8" stop-color="rgba(255,100,10,0.4)"/>
      <stop offset="1" stop-color="rgba(255,100,10,0)"/>
    </radialGradient>

    <!-- Ambient forge glow on ground -->
    <radialGradient id="ambientForge" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="rgba(255,120,20,0.18)"/>
      <stop offset="1" stop-color="rgba(255,80,0,0)"/>
    </radialGradient>

    <!-- Smoke (darker than house — industrial coal smoke) -->
    <radialGradient id="bsmithSmoke" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="rgba(60,55,50,0.6)"/>
      <stop offset="1" stop-color="rgba(60,55,50,0)"/>
    </radialGradient>

    <!-- Stone-block pattern -->
    <pattern id="bsmithBlocks" width="8" height="4" patternUnits="userSpaceOnUse">
      <rect width="8" height="4" fill="transparent"/>
      <line x1="0" y1="0" x2="8" y2="0" stroke="rgba(0,0,0,0.32)" stroke-width="0.4"/>
      <line x1="0" y1="2" x2="0" y2="4" stroke="rgba(0,0,0,0.25)" stroke-width="0.4"/>
      <line x1="4" y1="0" x2="4" y2="2" stroke="rgba(0,0,0,0.25)" stroke-width="0.4"/>
    </pattern>

    <!-- Iron tool: dark grey gradient -->
    <linearGradient id="ironTool" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6a6a78"/>
      <stop offset="1" stop-color="#2a2a30"/>
    </linearGradient>

    <!-- Ground shadow -->
    <radialGradient id="bsmithShadow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="rgba(0,0,0,0.5)"/>
      <stop offset="1" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="68" cy="106" rx="28" ry="5" fill="url(#bsmithShadow)"/>

  <!-- Ambient forge glow on ground (orange tint near forge) -->
  <ellipse cx="60" cy="100" rx="14" ry="5" fill="url(#ambientForge)"/>

  <!-- ─── Side wall (right depth strip) ─────────────────────────── -->
  <path d="M 75 80 L 80 84 L 80 102 L 75 102 Z" fill="url(#bsmithStoneSide)"/>

  <!-- ─── Main front walls ──────────────────────────────────────── -->
  <rect x="52" y="80" width="23" height="22" fill="url(#bsmithStone)"/>
  <rect x="52" y="80" width="23" height="22" fill="url(#bsmithBlocks)" opacity="0.9"/>

  <!-- Top edge sunlit highlight (warm tone — sun catches the rough stone) -->
  <line x1="52" y1="80" x2="75" y2="80" stroke="rgba(255,220,150,0.3)" stroke-width="0.6"/>

  <!-- ─── Flat roof parapet ─────────────────────────────────────── -->
  <rect x="50" y="76" width="27" height="4" fill="url(#bsmithRoof)"/>
  <line x1="50" y1="76" x2="77" y2="76" stroke="rgba(255,255,255,0.18)" stroke-width="0.5"/>
  <!-- Parapet shadow stripe -->
  <rect x="75" y="77" width="2" height="3" fill="rgba(0,0,0,0.4)"/>

  <!-- ─── Heavy chimney (right side of roof) ────────────────────── -->
  <g>
    <!-- Smoke wisps rising -->
    <ellipse cx="69" cy="58" rx="2.5" ry="1.6" fill="url(#bsmithSmoke)"/>
    <ellipse cx="67" cy="52" rx="3.2" ry="2" fill="url(#bsmithSmoke)"/>
    <ellipse cx="64" cy="46" rx="3.8" ry="2.4" fill="url(#bsmithSmoke)"/>
    <ellipse cx="61" cy="40" rx="4.2" ry="2.6" fill="url(#bsmithSmoke)"/>

    <!-- Chimney body -->
    <rect x="68" y="64" width="6" height="14" fill="#3a2a22"/>
    <rect x="68" y="64" width="6" height="14" fill="url(#bsmithBlocks)" opacity="0.9"/>
    <!-- Chimney cap (slightly wider) -->
    <rect x="67" y="63" width="8" height="2" fill="#1a0e08"/>
    <!-- Chimney sunlit edge -->
    <line x1="68" y1="64" x2="68" y2="78" stroke="rgba(255,210,150,0.25)" stroke-width="0.3"/>
  </g>

  <!-- ─── Forge window — Loop 234 (Phase D): pulse the amber fire
       like a working forge. Outer glow breathes in opacity (0.7→1.0
       over 1.6s); fire core scales subtly (rx 2→2.3); both share
       the same dur so highlight + glow read as ONE pulsing flame.
       Random-feeling key-times keep it from feeling metronomic. -->
  <g>
    <!-- Outer warm glow -->
    <ellipse cx="60" cy="89" rx="7" ry="6" fill="url(#forgeGlow)">
      <animate attributeName="opacity"
        values="0.85; 1; 0.78; 1; 0.9; 0.85"
        keyTimes="0; 0.22; 0.5; 0.7; 0.88; 1"
        dur="1.6s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Window opening (dark arch) -->
    <path d="M 57 92 L 57 88 A 3 3 0 0 1 63 88 L 63 92 Z" fill="#1a0a04"/>
    <!-- Bright fire core inside (scales with the pulse) -->
    <ellipse cx="60" cy="90" rx="2" ry="1.6" fill="#ffe080">
      <animate attributeName="rx"
        values="2; 2.3; 1.9; 2.2; 2; 2"
        keyTimes="0; 0.22; 0.5; 0.7; 0.88; 1"
        dur="1.6s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="60" cy="90" rx="1.2" ry="0.9" fill="#fff8e0">
      <animate attributeName="opacity"
        values="1; 0.95; 0.85; 1; 0.92; 1"
        keyTimes="0; 0.22; 0.5; 0.7; 0.88; 1"
        dur="1.6s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Arch frame -->
    <path d="M 57 92 L 57 88 A 3 3 0 0 1 63 88 L 63 92"
          stroke="#5a3818" stroke-width="0.6" fill="none"/>

    <!-- Sparks rising from forge (3 small bright dots) -->
    <circle cx="58" cy="84" r="0.4" fill="#fce080"/>
    <circle cx="62" cy="82" r="0.3" fill="#ffd040"/>
    <circle cx="60" cy="78" r="0.3" fill="#ffc830"/>

    <!-- Ash pile below the window -->
    <ellipse cx="60" cy="95" rx="3.5" ry="0.7" fill="#3a2e26"/>
    <ellipse cx="60" cy="94.5" rx="2.8" ry="0.5" fill="#5a4a40"/>
    <!-- Ember dots in ash -->
    <circle cx="59" cy="94.7" r="0.3" fill="#ff9030"/>
    <circle cx="61.5" cy="94.8" r="0.3" fill="#ff8020"/>
  </g>

  <!-- ─── Iron tongs hanging on wall (between forge and door) ───── -->
  <g>
    <!-- Hook -->
    <rect x="64" y="83" width="0.4" height="0.6" fill="#1a1208"/>
    <!-- Tongs handle -->
    <rect x="63.7" y="83.5" width="0.6" height="6" fill="url(#ironTool)"/>
    <!-- Tongs head (split jaws) -->
    <line x1="63.5" y1="89.5" x2="62.5" y2="91" stroke="#3a3a40" stroke-width="0.7"/>
    <line x1="64.2" y1="89.5" x2="65.2" y2="91" stroke="#3a3a40" stroke-width="0.7"/>
  </g>

  <!-- ─── Iron-banded wooden door ───────────────────────────────── -->
  <g>
    <!-- Door inset shadow -->
    <rect x="67" y="92" width="7" height="10" fill="#0a0604"/>
    <!-- Door planks (2 — split with seam) -->
    <rect x="67.3" y="92.3" width="3.2" height="9.4" fill="#5a3818"/>
    <rect x="70.5" y="92.3" width="3.2" height="9.4" fill="#4a2e12"/>
    <!-- Door frame -->
    <rect x="67" y="92" width="7" height="10" fill="none" stroke="#3a2010" stroke-width="0.5"/>
    <!-- Iron bands (3 horizontal across door) -->
    <rect x="67" y="94" width="7" height="0.7" fill="#1a1a1e"/>
    <rect x="67" y="97" width="7" height="0.7" fill="#1a1a1e"/>
    <rect x="67" y="100" width="7" height="0.7" fill="#1a1a1e"/>
    <!-- Iron studs at band ends -->
    <circle cx="67.5" cy="94.4" r="0.3" fill="#5a5a68"/>
    <circle cx="73.5" cy="94.4" r="0.3" fill="#5a5a68"/>
    <circle cx="67.5" cy="97.4" r="0.3" fill="#5a5a68"/>
    <circle cx="73.5" cy="97.4" r="0.3" fill="#5a5a68"/>
    <!-- Iron ring handle -->
    <circle cx="72.5" cy="98.5" r="0.7" fill="#2a2a30"/>
    <circle cx="72.5" cy="98.5" r="0.4" fill="#0a0604"/>
  </g>

  <!-- ─── Anvil prop (front-center, lower) ──────────────────────── -->
  <g>
    <!-- Anvil base block -->
    <rect x="55" y="100" width="8" height="2.5" fill="#1a1a22"/>
    <!-- Anvil body (trapezoid + horn) -->
    <path d="M 55 100 L 56 96 L 62 96 L 63 100 Z" fill="url(#ironTool)"/>
    <!-- Anvil horn (right taper) -->
    <path d="M 62 96 L 65 97 L 65 99 L 62 99 Z" fill="#3a3a40"/>
    <!-- Anvil top sheen -->
    <line x1="56" y1="96.3" x2="62" y2="96.3" stroke="rgba(180,180,200,0.5)" stroke-width="0.5"/>
    <!-- Hammer ON the anvil (mid-strike pose) -->
    <rect x="58" y="93" width="3.5" height="1.2" fill="#5a5a68"/>
    <line x1="59.7" y1="94" x2="60.5" y2="98" stroke="#7a5a30" stroke-width="0.6"/>
    <!-- Hammer head highlight -->
    <line x1="58" y1="93.2" x2="61.5" y2="93.2" stroke="rgba(200,200,220,0.5)" stroke-width="0.3"/>
  </g>

  <!-- ─── Hammer propped against right wall ─────────────────────── -->
  <g>
    <!-- Handle -->
    <line x1="74" y1="100" x2="76" y2="86" stroke="#7a5a30" stroke-width="1.6"/>
    <!-- Head -->
    <rect x="75" y="83" width="3.5" height="2.5" fill="#5a5a68"/>
    <!-- Highlight -->
    <line x1="75" y1="83.3" x2="78.5" y2="83.3" stroke="rgba(200,200,220,0.5)" stroke-width="0.3"/>
  </g>

  <!-- ─── Doorstep ──────────────────────────────────────────────── -->
  <rect x="65" y="102" width="11" height="1.5" fill="rgba(20,15,10,0.6)"/>

  <!-- ─── Subtle dust + ember flecks ────────────────────────────── -->
  <g>
    <!-- Embers near the forge -->
    <circle cx="56" cy="88" r="0.4" fill="rgba(255,150,40,0.5)"/>
    <circle cx="65" cy="86" r="0.3" fill="rgba(255,170,50,0.5)"/>
    <!-- Cool dust away from forge -->
    <circle cx="46" cy="74" r="0.4" fill="rgba(255,240,200,0.25)"/>
    <circle cx="84" cy="78" r="0.4" fill="rgba(255,240,200,0.25)"/>
  </g>
</svg>
