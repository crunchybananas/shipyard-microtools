<?xml version="1.0" encoding="UTF-8"?>
<!--
  Well sprite — Loop 306 (Phase F sprite, 255/259 filings).
  Sibling to drawWell canvas implementation (render.js:4463).
  ViewBox 0 0 128 128. Well centered at x=64; ground at y=108.
  Light: upper-left (matches granary/castle/church convention).

  Form: cobblestone diamond base + stone rim wall (cylinder) + dark
  water inside (with subtle shimmer animation per Phase D punctuation
  pattern) + 2 wooden posts + crossbar + rope + wooden bucket with
  iron hoops + nearby puddles.

  This is the FIRST PHASE F sprite — extends the SVG roster from 12
  user-buildable + canvas-fallback structures to 13. Closes the 255
  filing partially (well first; lumber + farm remain). Land-as-agent
  visual surface complements the 227 well_remembers narrative beat;
  the sprite + beat together make the well one of the most-narrated
  building objects in the realm.
-->
<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Cobblestone base: light upper, darker lower -->
    <linearGradient id="wellCobble" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#aaa098"/>
      <stop offset="0.5" stop-color="#9a9088"/>
      <stop offset="1" stop-color="#7a7068"/>
    </linearGradient>

    <!-- Stone rim wall gradient (warm grey) -->
    <linearGradient id="wellRim" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#b0a898"/>
      <stop offset="0.5" stop-color="#d0c8bc"/>
      <stop offset="1" stop-color="#8a8078"/>
    </linearGradient>

    <!-- Inner rim shadow -->
    <linearGradient id="wellRimInner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7a7068"/>
      <stop offset="1" stop-color="#5a5048"/>
    </linearGradient>

    <!-- Dark water radial -->
    <radialGradient id="wellWater" cx="0.4" cy="0.3" r="0.7">
      <stop offset="0" stop-color="#4a78a8"/>
      <stop offset="0.6" stop-color="#3a6898"/>
      <stop offset="1" stop-color="#1a3858"/>
    </radialGradient>

    <!-- Wooden post gradient -->
    <linearGradient id="wellPost" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0" stop-color="#7a5a38"/>
      <stop offset="1" stop-color="#5a3a18"/>
    </linearGradient>

    <!-- Crossbar (slightly lighter, sun-warmed top) -->
    <linearGradient id="wellCrossbar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a07848"/>
      <stop offset="1" stop-color="#7a5830"/>
    </linearGradient>

    <!-- Bucket wood gradient -->
    <linearGradient id="wellBucket" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a07040"/>
      <stop offset="1" stop-color="#7a5028"/>
    </linearGradient>

    <!-- Stone-block courses pattern -->
    <pattern id="wellStoneBlocks" width="8" height="3" patternUnits="userSpaceOnUse">
      <rect width="8" height="3" fill="transparent"/>
      <line x1="0" y1="0" x2="8" y2="0" stroke="rgba(40,32,22,0.18)" stroke-width="0.4"/>
      <line x1="4" y1="0" x2="4" y2="3" stroke="rgba(40,32,22,0.16)" stroke-width="0.4"/>
    </pattern>

    <!-- Soft ground shadow -->
    <radialGradient id="wellShadow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="rgba(0,0,0,0.4)"/>
      <stop offset="1" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
  </defs>

  <!-- Ground shadow (matches well's footprint) -->
  <ellipse cx="64" cy="110" rx="22" ry="4" fill="url(#wellShadow)"/>

  <!-- ─── Cobblestone diamond base ──────────────────────────── -->
  <path d="M 64 108 L 88 102 L 64 96 L 40 102 Z" fill="url(#wellCobble)"/>
  <!-- Top edge sunlit highlight -->
  <line x1="64" y1="96" x2="88" y2="102" stroke="rgba(255,255,255,0.3)" stroke-width="0.5"/>
  <!-- Cobblestone texture: small circles -->
  <g fill="rgba(40,32,22,0.18)" stroke="rgba(40,32,22,0.25)" stroke-width="0.3">
    <circle cx="48" cy="100" r="1.6"/>
    <circle cx="55" cy="103" r="1.4"/>
    <circle cx="62" cy="102" r="1.6"/>
    <circle cx="70" cy="103.5" r="1.4"/>
    <circle cx="78" cy="102" r="1.6"/>
    <circle cx="58" cy="105" r="1.2"/>
    <circle cx="68" cy="105" r="1.4"/>
  </g>

  <!-- ─── Puddles around the base ───────────────────────────── -->
  <g fill="rgba(96, 165, 250, 0.45)">
    <ellipse cx="40" cy="113" rx="6" ry="2"/>
    <ellipse cx="86" cy="112" rx="5" ry="1.8"/>
  </g>

  <!-- ─── Stone rim wall (cylinder) ─────────────────────────── -->
  <!-- Front wall (the visible curve of the cylinder) -->
  <path d="M 50 88 A 14 5 0 0 0 78 88 L 78 95 A 14 5 0 0 1 50 95 Z"
        fill="url(#wellRim)"/>
  <!-- Stone-block pattern overlay on the wall -->
  <path d="M 50 88 A 14 5 0 0 0 78 88 L 78 95 A 14 5 0 0 1 50 95 Z"
        fill="url(#wellStoneBlocks)" opacity="0.85"/>
  <!-- Mortar verticals -->
  <g stroke="rgba(40,32,22,0.25)" stroke-width="0.5">
    <line x1="55" y1="89" x2="55" y2="93"/>
    <line x1="60" y1="88.5" x2="60" y2="93.5"/>
    <line x1="65" y1="88" x2="65" y2="94"/>
    <line x1="70" y1="88.5" x2="70" y2="93.5"/>
    <line x1="74" y1="89" x2="74" y2="93"/>
  </g>

  <!-- ─── Stone rim top (outer ellipse + inner shadow) ──────── -->
  <ellipse cx="64" cy="88" rx="14" ry="5" fill="url(#wellRim)"/>
  <!-- Top edge sunlit highlight -->
  <ellipse cx="64" cy="87.7" rx="13.5" ry="4.2" fill="none" stroke="rgba(255,240,210,0.3)" stroke-width="0.4"/>
  <!-- Inner shadow ring (where wall thickness shows) -->
  <ellipse cx="64" cy="88" rx="10" ry="3.5" fill="url(#wellRimInner)"/>

  <!-- ─── Dark water inside ─────────────────────────────────── -->
  <ellipse cx="63.5" cy="87.8" rx="9" ry="3" fill="url(#wellWater)"/>
  <!-- Water shimmer (slow pulse — Phase D punctuation animation;
       8s cycle, mostly steady, brief brightening 80%-90% of cycle) -->
  <ellipse cx="62" cy="87" rx="3" ry="1.2" fill="rgba(180,220,255,0.5)" transform="rotate(-10 62 87)">
    <animate attributeName="opacity"
      keyTimes="0; 0.8; 0.85; 0.9; 1"
      values="0.5; 0.5; 0.85; 0.4; 0.5"
      dur="8s" repeatCount="indefinite"/>
  </ellipse>

  <!-- ─── Wooden support posts ──────────────────────────────── -->
  <rect x="48" y="46" width="3" height="42" fill="url(#wellPost)"/>
  <!-- Left post highlight -->
  <line x1="48" y1="46" x2="48" y2="88" stroke="rgba(255,240,210,0.18)" stroke-width="0.4"/>

  <rect x="77" y="46" width="3" height="42" fill="url(#wellPost)"/>
  <line x1="77" y1="46" x2="77" y2="88" stroke="rgba(255,240,210,0.18)" stroke-width="0.4"/>

  <!-- ─── Crossbar (with subtle wood grain) ─────────────────── -->
  <rect x="46" y="42" width="36" height="5" fill="url(#wellCrossbar)"/>
  <!-- Top edge highlight -->
  <line x1="46" y1="42" x2="82" y2="42" stroke="rgba(255,240,210,0.4)" stroke-width="0.5"/>
  <!-- Wood grain lines -->
  <g stroke="rgba(40,30,20,0.25)" stroke-width="0.3">
    <line x1="48" y1="44.5" x2="80" y2="44.5"/>
    <line x1="48" y1="45.5" x2="80" y2="45.5"/>
  </g>

  <!-- ─── Rope from crossbar to bucket handle apex ──────────── -->
  <line x1="64" y1="47" x2="64" y2="73" stroke="#c8a860" stroke-width="1.2"/>
  <!-- Rope twist detail -->
  <g stroke="rgba(180,140,80,0.55)" stroke-width="0.4">
    <line x1="63" y1="50" x2="65" y2="52"/>
    <line x1="63" y1="54" x2="65" y2="56"/>
    <line x1="63" y1="58" x2="65" y2="60"/>
    <line x1="63" y1="62" x2="65" y2="64"/>
    <line x1="63" y1="66" x2="65" y2="68"/>
    <line x1="63" y1="70" x2="65" y2="72"/>
  </g>

  <!-- ─── Wooden bucket ─────────────────────────────────────── -->
  <g>
    <!-- Bucket body (slightly tapered trapezoid) -->
    <path d="M 60 76 L 68 76 L 67 84 L 61 84 Z" fill="url(#wellBucket)"/>
    <!-- Bucket front sunlit edge -->
    <line x1="60" y1="76" x2="68" y2="76" stroke="rgba(255,240,210,0.3)" stroke-width="0.4"/>
    <!-- Iron hoops -->
    <line x1="60" y1="78.5" x2="68" y2="78.5" stroke="#3a2e1e" stroke-width="0.6"/>
    <line x1="60" y1="82" x2="67" y2="82" stroke="#3a2e1e" stroke-width="0.6"/>
    <!-- Bucket handle (semicircle arc above) -->
    <path d="M 60 76 A 4 3 0 0 1 68 76" fill="none" stroke="#8a7028" stroke-width="0.7"/>
  </g>

  <!-- ─── Subtle dust flecks ────────────────────────────────── -->
  <g fill="rgba(255,240,200,0.32)">
    <circle cx="38" cy="84" r="0.5"/>
    <circle cx="92" cy="78" r="0.5"/>
    <circle cx="50" cy="60" r="0.4"/>
    <circle cx="78" cy="65" r="0.4"/>
  </g>
</svg>
